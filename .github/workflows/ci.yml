name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install root deps
        run: npm ci --legacy-peer-deps
      - name: Install server deps
        run: npm --prefix src/server ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
